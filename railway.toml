[build]
builder = "nixpacks"
buildCommand = "npm install -g pnpm@10 && pnpm install && BASE_PATH=/ pnpm --filter @workspace/quran-app run build && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
